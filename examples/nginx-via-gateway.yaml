apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gw-backend
  namespace: default
  labels:
    app: nginx-gw-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gw-backend
  template:
    metadata:
      labels:
        app: nginx-gw-backend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gw-backend
  namespace: default
spec:
  selector:
    app: nginx-gw-backend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-gw
  namespace: default
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: app-gw.l3.nu
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-gw-route
  namespace: default
spec:
  parentRefs:
    - name: my-gw
      namespace: default
      sectionName: http
  hostnames:
    - app-gw.l3.nu
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx-gw-backend
          port: 80
