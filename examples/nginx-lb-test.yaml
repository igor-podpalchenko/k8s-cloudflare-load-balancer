apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-with-class
  namespace: default
  labels:
    app: nginx-with-class
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-with-class
  template:
    metadata:
      labels:
        app: nginx-with-class
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-with-class
  namespace: default
spec:
  type: LoadBalancer
  loadBalancerClass: tcp-lb.l3.nu/cloudflared
  selector:
    app: nginx-with-class
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
