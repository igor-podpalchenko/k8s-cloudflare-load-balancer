{{- $defaultHook := dict
  "name" "service-default-class.tcp-lb.l3.nu"
  "admissionReviewVersions" (list "v1")
  "sideEffects" "None"
  "timeoutSeconds" 2
  "failurePolicy" (.Values.webhook.failurePolicy | default "Ignore")
  "matchPolicy" "Equivalent"
  "reinvocationPolicy" "Never"
  "namespaceSelector" (dict)
  "objectSelector" (dict)
  "rules" (list (dict "apiGroups" (list "") "apiVersions" (list "v1") "operations" (list "CREATE") "resources" (list "services") "scope" "*"))
  "clientConfig" (dict "path" "/mutate-v1-service" "port" 443)
-}}
{{- $hooks := .Values.webhook.webhooks | default (list $defaultHook) -}}
{{- $webhookEnabledLabel := "true" -}}
{{- if hasKey .Values.webhook "labels" -}}
  {{- if hasKey .Values.webhook.labels "cf-lb-enabled" -}}
    {{- $webhookEnabledLabel = printf "%v" (index .Values.webhook.labels "cf-lb-enabled") -}}
  {{- end -}}
{{- end -}}
{{- if eq (include "cf-lb-controller.webhookEnabled" .) "true" }}
{{- $secretName := printf "%s-webhook-certs" (include "cf-lb-controller.fullname" .) -}}
{{- $serviceName := printf "%s-webhook" (include "cf-lb-controller.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $caCert := "" -}}
{{- $tlsCrt := "" -}}
{{- $tlsKey := "" -}}
{{- if $existing }}
{{- $caCert = index $existing.data "ca.crt" -}}
{{- $tlsCrt = index $existing.data "tls.crt" -}}
{{- $tlsKey = index $existing.data "tls.key" -}}
{{- else }}
{{- $ca := genCA (printf "%s-ca" (include "cf-lb-controller.fullname" .)) 3650 -}}
{{- $dns := list (printf "%s.%s.svc" $serviceName .Release.Namespace) (printf "%s.%s.svc.cluster.local" $serviceName .Release.Namespace) -}}
{{- $cert := genSignedCert $serviceName nil $dns 3650 $ca -}}
{{- $caCert = b64enc $ca.Cert -}}
{{- $tlsCrt = b64enc $cert.Cert -}}
{{- $tlsKey = b64enc $cert.Key -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "cf-lb-controller.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    cf-lb-component: webhook
    cf-lb-enabled: {{ $webhookEnabledLabel | quote }}
type: Opaque
data:
  ca.crt: {{ $caCert }}
  tls.crt: {{ $tlsCrt }}
  tls.key: {{ $tlsKey }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "cf-lb-controller.fullname" . }}-service-defaulter
  labels:
    app.kubernetes.io/name: {{ include "cf-lb-controller.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    cf-lb-component: webhook
    cf-lb-enabled: {{ $webhookEnabledLabel | quote }}
webhooks:
{{- range $hook := $hooks }}
  - name: {{ $hook.name | quote }}
    admissionReviewVersions:
{{ toYaml ($hook.admissionReviewVersions | default (list "v1")) | indent 6 }}
    sideEffects: {{ $hook.sideEffects | default "None" }}
    timeoutSeconds: {{ $hook.timeoutSeconds | default 2 }}
    failurePolicy: {{ $hook.failurePolicy | default $.Values.webhook.failurePolicy | default "Ignore" }}
    matchPolicy: {{ $hook.matchPolicy | default "Equivalent" }}
    reinvocationPolicy: {{ $hook.reinvocationPolicy | default "Never" }}
    namespaceSelector:
{{ toYaml ($hook.namespaceSelector | default dict) | indent 6 }}
    objectSelector:
{{ toYaml ($hook.objectSelector | default dict) | indent 6 }}
    rules:
{{ toYaml ($hook.rules | default (list (dict "apiGroups" (list "") "apiVersions" (list "v1") "operations" (list "CREATE") "resources" (list "services") "scope" "*"))) | indent 6 }}
    clientConfig:
      service:
        namespace: {{ $.Release.Namespace }}
        name: {{ include "cf-lb-controller.fullname" $ }}-webhook
        path: {{ (index ($hook.clientConfig | default dict) "path") | default "/mutate-v1-service" }}
        port: {{ (index ($hook.clientConfig | default dict) "port") | default 443 }}
      caBundle: {{ $caCert }}
{{- end }}
{{- end }}
